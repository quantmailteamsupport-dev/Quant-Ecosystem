name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: quant-platform-staging
  HELM_RELEASE: quant-platform
  HELM_NAMESPACE: staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity
          - chat-api
          - mail-api
          - ai-api
          - sync-api
          - ads-api
          - tube-api
          - neon-api
          - edits-api
          - max-api
          - ws-gateway
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/quant-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/quant-${{ matrix.service }}:staging-latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./infra/helm/quant-platform \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            -f ./infra/helm/quant-platform/values.yaml \
            -f ./infra/helm/quant-platform/values-staging.yaml \
            --set global.image.tag=${{ github.sha }} \
            --set global.image.registry=${{ env.ECR_REGISTRY }} \
            --wait \
            --timeout 10m

      - name: Notify Slack on deploy failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deployment FAILED for commit ${{ github.sha }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for rollout
        run: |
          for service in identity chat-api mail-api ai-api sync-api ads-api tube-api neon-api edits-api max-api ws-gateway; do
            kubectl rollout status deployment/quant-platform-${service} \
              --namespace ${{ env.HELM_NAMESPACE }} \
              --timeout=300s || true
          done

      - name: Run health checks
        run: |
          STAGING_URL="${{ secrets.STAGING_BASE_URL }}"
          SERVICES=("identity:3000" "chat-api:3002" "mail-api:3001" "ai-api:3020" "sync-api:3004" "ads-api:3005" "tube-api:3006" "neon-api:3007" "edits-api:3008" "max-api:3009")

          FAILED=0
          for svc in "${SERVICES[@]}"; do
            NAME="${svc%%:*}"
            echo "Checking health of ${NAME}..."
            STATUS=$(kubectl exec -n ${{ env.HELM_NAMESPACE }} deploy/quant-platform-${NAME} -- wget -qO- http://localhost:${svc##*:}/health 2>/dev/null || echo "UNHEALTHY")
            if echo "$STATUS" | grep -q "ok\|healthy\|UP"; then
              echo "  ${NAME}: HEALTHY"
            else
              echo "  ${NAME}: UNHEALTHY - ${STATUS}"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "ERROR: ${FAILED} service(s) failed health checks"
            exit 1
          fi
          echo "All services are healthy"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deployment SUCCESSFUL for commit ${{ github.sha }}\nAll health checks passed."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging smoke tests FAILED for commit ${{ github.sha }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
