name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Image tag (commit SHA) to deploy to production'
        required: true
        type: string
      skip_canary:
        description: 'Skip canary deployment and deploy directly to full rollout'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: quant-platform-production
  HELM_RELEASE: quant-platform
  HELM_NAMESPACE: production

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify images exist in ECR
        run: |
          SERVICES="identity chat-api mail-api ai-api sync-api ads-api tube-api neon-api edits-api max-api ws-gateway"
          TAG="${{ inputs.version_tag }}"

          for service in $SERVICES; do
            echo "Checking quant-${service}:${TAG}..."
            aws ecr describe-images \
              --repository-name quant-${service} \
              --image-ids imageTag=${TAG} \
              --region ${{ env.AWS_REGION }} > /dev/null 2>&1

            if [ $? -ne 0 ]; then
              echo "ERROR: Image quant-${service}:${TAG} not found in ECR"
              exit 1
            fi
            echo "  Found quant-${service}:${TAG}"
          done
          echo "All images verified in ECR"

      - name: Run final validation checks
        run: |
          echo "Validating Helm chart..."
          helm template ${{ env.HELM_RELEASE }} ./infra/helm/quant-platform \
            -f ./infra/helm/quant-platform/values.yaml \
            -f ./infra/helm/quant-platform/values-production.yaml \
            --set global.image.tag=${{ inputs.version_tag }} \
            --set global.image.registry=${{ env.ECR_REGISTRY }} > /dev/null
          echo "Helm template validation passed"

  deploy-canary:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ !inputs.skip_canary }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Deploy canary (10% traffic)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }}-canary ./infra/helm/quant-platform \
            --namespace ${{ env.HELM_NAMESPACE }} \
            -f ./infra/helm/quant-platform/values.yaml \
            -f ./infra/helm/quant-platform/values-production.yaml \
            --set global.image.tag=${{ inputs.version_tag }} \
            --set global.image.registry=${{ env.ECR_REGISTRY }} \
            --set global.canary.enabled=true \
            --set global.canary.weight=10 \
            --wait \
            --timeout 10m

      - name: Notify Slack - canary deployed
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production CANARY deployed with tag ${{ inputs.version_tag }} (10% traffic)"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  verify-canary:
    runs-on: ubuntu-latest
    needs: deploy-canary
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for canary stabilization
        run: sleep 120

      - name: Check canary health
        run: |
          SERVICES="identity chat-api mail-api ai-api sync-api ads-api tube-api neon-api edits-api max-api ws-gateway"
          FAILED=0

          for service in $SERVICES; do
            READY=$(kubectl get deployment quant-platform-canary-${service} \
              -n ${{ env.HELM_NAMESPACE }} \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "$READY" = "0" ] || [ -z "$READY" ]; then
              echo "WARN: Canary for ${service} has no ready replicas"
              FAILED=$((FAILED + 1))
            else
              echo "OK: Canary for ${service} has ${READY} ready replicas"
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "ERROR: Canary services unhealthy (${FAILED}/11)"
            exit 1
          fi

      - name: Check error rates via CloudWatch
        run: |
          END_TIME=$(date -u +%Y-%m-%dT%H:%M:%S)
          START_TIME=$(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%S 2>/dev/null || date -u -v-2M +%Y-%m-%dT%H:%M:%S)

          ERROR_RATE=$(aws cloudwatch get-metric-statistics \
            --namespace "QuantPlatform/Production" \
            --metric-name "5xxErrorRate" \
            --start-time "$START_TIME" \
            --end-time "$END_TIME" \
            --period 60 \
            --statistics Average \
            --query 'Datapoints[0].Average' \
            --output text 2>/dev/null || echo "0")

          echo "Current 5xx error rate: ${ERROR_RATE}%"

          if [ "$(echo "$ERROR_RATE > 5" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
            echo "ERROR: Error rate exceeds 5% threshold"
            exit 1
          fi
          echo "Error rate is within acceptable range"

      - name: Rollback canary on failure
        if: failure()
        run: |
          echo "Rolling back canary deployment..."
          helm uninstall ${{ env.HELM_RELEASE }}-canary \
            --namespace ${{ env.HELM_NAMESPACE }} || true
          echo "Canary rolled back"

      - name: Notify on canary failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "ALERT: Production canary FAILED for tag ${{ inputs.version_tag }}. Canary rolled back.\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify PagerDuty on canary failure
        if: failure()
        run: |
          curl -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_ROUTING_KEY }}",
              "event_action": "trigger",
              "payload": {
                "summary": "Production canary deployment failed for ${{ inputs.version_tag }}",
                "severity": "warning",
                "source": "github-actions",
                "component": "quant-platform"
              }
            }' || true

  promote:
    runs-on: ubuntu-latest
    needs: [validate, verify-canary, deploy-canary]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.verify-canary.result == 'success' || needs.deploy-canary.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Remove canary deployment
        run: |
          helm uninstall ${{ env.HELM_RELEASE }}-canary \
            --namespace ${{ env.HELM_NAMESPACE }} 2>/dev/null || true

      - name: Promote to full production rollout
        id: deploy
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./infra/helm/quant-platform \
            --namespace ${{ env.HELM_NAMESPACE }} \
            -f ./infra/helm/quant-platform/values.yaml \
            -f ./infra/helm/quant-platform/values-production.yaml \
            --set global.image.tag=${{ inputs.version_tag }} \
            --set global.image.registry=${{ env.ECR_REGISTRY }} \
            --wait \
            --timeout 15m

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Production deployment failed, initiating rollback..."
          helm rollback ${{ env.HELM_RELEASE }} 0 \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --wait \
            --timeout 10m
          echo "Rollback completed"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deployment SUCCESSFUL\nVersion: ${{ inputs.version_tag }}\nCluster: ${{ env.EKS_CLUSTER }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "CRITICAL: Production deployment FAILED and rolled back\nVersion: ${{ inputs.version_tag }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify PagerDuty on failure
        if: failure()
        run: |
          curl -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_ROUTING_KEY }}",
              "event_action": "trigger",
              "payload": {
                "summary": "CRITICAL: Production deployment failed and rolled back for ${{ inputs.version_tag }}",
                "severity": "critical",
                "source": "github-actions",
                "component": "quant-platform"
              }
            }' || true
