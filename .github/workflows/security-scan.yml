name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: Create issue for critical findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sarif = JSON.parse(fs.readFileSync('trivy-fs-results.sarif', 'utf8'));
            const results = sarif.runs?.[0]?.results || [];
            const critical = results.filter(r => r.level === 'error');

            if (critical.length > 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Security] ${critical.length} critical vulnerabilities found by Trivy`,
                body: `## Trivy Filesystem Scan Results\n\n` +
                  `Found **${critical.length} critical** vulnerabilities.\n\n` +
                  `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                  `Please review the Security tab for full details.`,
                labels: ['security', 'critical']
              });
            }

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          pnpm audit --audit-level=high 2>&1 | tee audit-results.txt
          AUDIT_EXIT=${PIPESTATUS[0]}
          echo "audit_exit_code=${AUDIT_EXIT}" >> $GITHUB_ENV
          exit 0

      - name: Upload audit results
        if: env.audit_exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: audit-results.txt

      - name: Create issue for audit failures
        if: env.audit_exit_code != '0' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditResults = fs.readFileSync('audit-results.txt', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Security] npm audit found high/critical vulnerabilities',
              body: `## pnpm Audit Results\n\n` +
                `\`\`\`\n${auditResults.substring(0, 3000)}\n\`\`\`\n\n` +
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'dependencies']
            });

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: 'codeql-sast'

  dast:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.STAGING_BASE_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: report_html.html

      - name: Create issue for ZAP findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Security] OWASP ZAP baseline scan found issues',
              body: `## OWASP ZAP Scan Results\n\n` +
                `The weekly OWASP ZAP baseline scan found potential security issues against staging.\n\n` +
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                `Please review the uploaded ZAP report artifact for details.`,
              labels: ['security', 'dast']
            });
