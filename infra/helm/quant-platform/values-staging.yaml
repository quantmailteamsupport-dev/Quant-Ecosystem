global:
  environment: staging
  domain: staging.quant.dev
  databaseCIDRs:
    - 10.1.20.0/24
    - 10.1.21.0/24
    - 10.1.22.0/24
  redisCIDRs:
    - 10.1.10.0/24
    - 10.1.11.0/24
    - 10.1.12.0/24

configmap:
  NODE_ENV: staging
  LOG_LEVEL: debug
  CORS_ORIGINS: 'https://staging.quant.dev'
  JWT_ISSUER: 'https://staging.quant.dev'
  JWT_AUDIENCE: 'quant-platform-staging'

ingress:
  tls:
    secretName: quant-platform-staging-tls

services:
  identity:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    autoscaling:
      minReplicas: 1
      maxReplicas: 3
    pdb:
      minAvailable: 1

