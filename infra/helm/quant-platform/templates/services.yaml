{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quant-platform.fullname" $ }}-{{ $name }}
  labels:
    {{- include "quant-platform.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $svc.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "quant-platform.serviceSelectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
{{- end }}
{{- end }}
