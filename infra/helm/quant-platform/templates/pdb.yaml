{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "quant-platform.fullname" $ }}-{{ $name }}
  labels:
    {{- include "quant-platform.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
spec:
  minAvailable: {{ $svc.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "quant-platform.serviceSelectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
{{- end }}
{{- end }}
