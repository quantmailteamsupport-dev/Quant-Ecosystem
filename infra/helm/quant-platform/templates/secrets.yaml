{{- if .Values.secrets.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "quant-platform.fullname" . }}-secrets
  labels:
    {{- include "quant-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.secrets.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "quant-platform.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.secrets.keys }}
    - secretKey: {{ . }}
      remoteRef:
        key: quant-platform/{{ $.Values.global.environment }}/{{ . }}
    {{- end }}
{{- else }}
# When ExternalSecrets is not enabled, create a placeholder Secret.
# In production, replace these values or use a secrets management solution.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "quant-platform.fullname" . }}-secrets
  labels:
    {{- include "quant-platform.labels" . | nindent 4 }}
type: Opaque
data: {}
{{- end }}
