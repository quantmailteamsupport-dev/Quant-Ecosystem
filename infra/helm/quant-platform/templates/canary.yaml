{{- if .Values.canary }}
{{- if .Values.canary.enabled }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "quant-platform.fullname" $ }}-{{ $name }}-canary
  labels:
    {{- include "quant-platform.serviceLabels" (dict "root" $ "name" $name) | nindent 4 }}
    app.kubernetes.io/component: canary
spec:
  replicas: {{ $svc.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "quant-platform.serviceSelectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
      rollout-type: canary
  strategy:
    canary:
      canaryService: {{ include "quant-platform.fullname" $ }}-{{ $name }}-canary-svc
      stableService: {{ include "quant-platform.fullname" $ }}-{{ $name }}
      analysis:
        templates:
          - templateName: {{ include "quant-platform.fullname" $ }}-canary-analysis
        startingStep: 1
        args:
          - name: service-name
            value: {{ $name }}
      steps:
        - setWeight: 1
        - pause:
            duration: 5m
        - setWeight: 10
        - pause:
            duration: 10m
        - setWeight: 50
        - pause:
            duration: 15m
        - setWeight: 100
      maxSurge: "25%"
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 30
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100
  template:
    metadata:
      labels:
        {{- include "quant-platform.serviceSelectorLabels" (dict "root" $ "name" $name) | nindent 8 }}
        rollout-type: canary
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
    spec:
      serviceAccountName: {{ include "quant-platform.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
      containers:
        - name: {{ $name }}
          image: {{ include "quant-platform.image" (dict "root" $ "svc" $svc) }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: {{ include "quant-platform.fullname" $ }}-config
            - secretRef:
                name: {{ include "quant-platform.fullname" $ }}-secrets
{{- end }}
{{- end }}
{{- end }}
{{- end }}
