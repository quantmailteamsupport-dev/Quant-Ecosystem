{{- if .Values.meilisearch.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "quant-platform.fullname" . }}-meilisearch
  labels:
    {{- include "quant-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  serviceName: {{ include "quant-platform.fullname" . }}-meilisearch
  replicas: {{ .Values.meilisearch.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "quant-platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "quant-platform.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: meilisearch
    spec:
      containers:
        - name: meilisearch
          image: "{{ .Values.meilisearch.image.repository }}:{{ .Values.meilisearch.image.tag }}"
          imagePullPolicy: {{ .Values.meilisearch.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.meilisearch.port }}
              protocol: TCP
          {{- with .Values.meilisearch.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.meilisearch.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /meili_data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.meilisearch.storage.storageClass }}
        storageClassName: {{ .Values.meilisearch.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.meilisearch.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quant-platform.fullname" . }}-meilisearch
  labels:
    {{- include "quant-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.meilisearch.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "quant-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: meilisearch
{{- end }}
