global:
  imageRegistry: ''
  imagePullSecrets: []
  environment: development
  domain: quant.local
  databaseCIDRs: []
  redisCIDRs: []

nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: true
  name: ''
  annotations: {}

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
  tls:
    enabled: true
    secretName: quant-platform-tls

configmap:
  NODE_ENV: production
  LOG_LEVEL: info
  CORS_ORIGINS: 'https://quant.local'
  JWT_ISSUER: 'https://quant.local'
  JWT_AUDIENCE: 'quant-platform'

secrets:
  externalSecret:
    enabled: true
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    refreshInterval: 1h
  keys:
    - JWT_SECRET
    - DATABASE_URL
    - REDIS_URL
    - AI_API_KEY
    - SMTP_PASSWORD
    - S3_ACCESS_KEY
    - S3_SECRET_KEY

services:
  identity:
    enabled: true
    replicaCount: 2
    image:
      repository: quant/identity
      tag: latest
      pullPolicy: IfNotPresent
    port: 3001
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilization: 70
      targetMemoryUtilization: 80
    pdb:
      enabled: true
      minAvailable: 1
    networkPolicy:
      enabled: true
      allowedNamespaces:
        - quant-system
    env: []
    secrets: []
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 15
        periodSeconds: 10
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 5

  chat-api:
