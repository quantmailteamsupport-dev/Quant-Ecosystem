global:
  environment: production
  domain: quant.app
  databaseCIDRs:
    - 10.0.20.0/24
    - 10.0.21.0/24
    - 10.0.22.0/24
  redisCIDRs:
    - 10.0.10.0/24
    - 10.0.11.0/24
    - 10.0.12.0/24
  multiRegion:
    enabled: true
    primary: us-east-1
    secondary: eu-west-1

configmap:
  NODE_ENV: production
  LOG_LEVEL: warn
  CORS_ORIGINS: 'https://quant.app'
  JWT_ISSUER: 'https://quant.app'
  JWT_AUDIENCE: 'quant-platform'

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/hsts: 'true'
    nginx.ingress.kubernetes.io/hsts-max-age: '31536000'
    external-dns.alpha.kubernetes.io/hostname: quant.app
    multi-region/failover: 'enabled'
  hosts:
    - host: quant.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    secretName: quant-platform-production-tls
    hosts:
      - quant.app
      - '*.quant.app'

canary:
  enabled: true
  prometheus:
    address: http://prometheus-server.monitoring:9090
  rollback:
    maxErrorRate: 0.01
    maxP99Latency: 2000

services:
  identity:
    replicaCount: 5
    resources:
      requests:
        cpu: 1000m
        memory: 1Gi
      limits:
        cpu: 4000m
        memory: 4Gi
    autoscaling:
      minReplicas: 5
      maxReplicas: 30
    pdb:
      minAvailable: 3

