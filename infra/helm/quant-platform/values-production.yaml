global:
  environment: production
  domain: quant.io
  databaseCIDRs:
    - 10.0.20.0/24
    - 10.0.21.0/24
    - 10.0.22.0/24
  redisCIDRs:
    - 10.0.10.0/24
    - 10.0.11.0/24
    - 10.0.12.0/24

configmap:
  NODE_ENV: production
  LOG_LEVEL: warn
  CORS_ORIGINS: 'https://quant.io'
  JWT_ISSUER: 'https://quant.io'
  JWT_AUDIENCE: 'quant-platform'

ingress:
  tls:
    secretName: quant-platform-production-tls

services:
  identity:
    replicaCount: 3
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    autoscaling:
      minReplicas: 3
      maxReplicas: 20
    pdb:
      minAvailable: 2

  chat-api:
