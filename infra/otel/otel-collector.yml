receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: quant-services
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: (\d+)
              target_label: __address__
              replacement: $1
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod

  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      network: {}

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s

  attributes:
    actions:
      - key: service.namespace
        value: quant
        action: upsert
      - key: environment
        from_attribute: ""
        action: upsert
        value: ${env:ENVIRONMENT}

  resource:
    attributes:
      - key: host.name
        from_attribute: ""
        action: upsert
        value: ${env:HOSTNAME}

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: quant
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true

  otlp/jaeger:
    endpoint: jaeger-collector:4317
    tls:
      insecure: true

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  awscloudwatchlogs:
    log_group_name: ${env:CLOUDWATCH_LOG_GROUP:/quant/platform}
    log_stream_name: otel-collector
    region: ${env:AWS_REGION:us-east-1}

service:
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [otlp/jaeger, otlp/tempo]

    metrics:
      receivers: [otlp, prometheus, hostmetrics]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [awscloudwatchlogs]
