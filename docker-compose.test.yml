version: '3.8'

services:
  postgres-test:
    image: ankane/pgvector:latest
    container_name: quant-postgres-test
    environment:
      POSTGRES_USER: quant_test
      POSTGRES_PASSWORD: quant_test
      POSTGRES_DB: quantdb_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quant_test']
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: quant-redis-test
    ports:
      - '6380:6379'
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-test:
    image: minio/minio
    container_name: quant-minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9002:9000'
      - '9003:9001'
    volumes:
      - minio_test_data:/data

  mailhog-test:
    image: mailhog/mailhog
    container_name: quant-mailhog-test
    ports:
      - '1026:1025'
      - '8026:8025'

  meilisearch-test:
    image: getmeili/meilisearch:latest
    container_name: quant-meilisearch-test
    environment:
      MEILI_MASTER_KEY: testMasterKey
    ports:
      - '7701:7700'
    volumes:
      - meilisearch_test_data:/meili_data

  nats-test:
    image: nats:latest
    container_name: quant-nats-test
    command: ['--jetstream', '--store_dir', '/data']
    ports:
      - '4223:4222'
      - '8223:8222'
    volumes:
      - nats_test_data:/data

  redpanda-test:
    image: redpandadata/redpanda:latest
    container_name: quant-redpanda-test
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9093
      - --advertise-kafka-addr PLAINTEXT://localhost:9093
      - --schema-registry-addr 0.0.0.0:8083
    ports:
      - '9093:9093'
      - '8083:8083'
      - '8084:8082'
    volumes:
      - redpanda_test_data:/var/lib/redpanda/data

  qdrant-test:
    image: qdrant/qdrant:latest
    container_name: quant-qdrant-test
    ports:
      - '6335:6333'
      - '6336:6334'
    volumes:
      - qdrant_test_data:/qdrant/storage

volumes:
  postgres_test_data:
  redis_test_data:
  minio_test_data:
  meilisearch_test_data:
  nats_test_data:
  redpanda_test_data:
  qdrant_test_data:
